name: Install and Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13
    - name: Install dependencies
      run: bun ci
    - name: Typecheck
      run: bun run typecheck
    - name: Test
      run: bun test
    - name: Build project
      run: bun run build:all

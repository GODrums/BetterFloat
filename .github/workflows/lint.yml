name: QA / Lint (Biome)

on:
  push:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.7.1
      - name: Run Biome
        run: biome ci src/
